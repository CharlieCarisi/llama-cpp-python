name: Build and Release llama-cpp-python Wheel

on:
  workflow_dispatch:
    inputs:
      version:
        description: "llama-cpp-python version, e.g. 0.3.2, 0.3.3, 0.3.8"
        required: true
        default: "0.3.2"
      release_suffix:
        description: "Optional release suffix"
        required: true
        default: "test"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    runs-on: windows-2022

    steps:
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          architecture: "x64"

      - name: Install tools
        shell: pwsh
        run: |
          python -m pip install --upgrade "pip<26" setuptools wheel
          python -m pip install cibuildwheel==2.21.1 build

      - name: Download source
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          New-Item -ItemType Directory -Force -Path src | Out-Null
          python -m pip download "llama-cpp-python==$version" --no-binary=:all: --no-deps -d src
      
          @'
          import tarfile
          from pathlib import Path
      
          src = Path("src")
          tgz = next(src.glob("llama_cpp_python-*.tar.gz"))
      
          with tarfile.open(tgz, "r:gz") as t:
              t.extractall(src)
      
          roots = [
              p for p in src.iterdir()
              if p.is_dir() and p.name.startswith("llama_cpp_python")
          ]
      
          if not roots:
              raise RuntimeError("Extracted source folder not found")
      
          Path("SOURCE_ROOT.txt").write_text(str(roots[0]), encoding="utf-8")
          print("Source root:", roots[0])
          '@ | python
      
            - name: Patch source if needed
              shell: pwsh
              run: |
                $sourceRoot = Get-Content SOURCE_ROOT.txt
      
                @'
                from pathlib import Path
      
                root = Path("SOURCE_ROOT.txt").read_text(encoding="utf-8").strip()
                root = Path(root)
      
                files = [
                    root / "vendor" / "llama.cpp" / "common" / "log.cpp",
                    root / "vendor" / "llama.cpp" / "common" / "common.cpp",
                ]
      
                for file in files:
                    if not file.exists():
                        print("Missing, skipped:", file)
                        continue
      
                    text = file.read_text(encoding="utf-8", errors="ignore")
      
                    if "std::chrono" in text and "#include <chrono>" not in text:
                        file.write_text("#include <chrono>\n" + text, encoding="utf-8")
                        print("Patched <chrono>:", file)
                    else:
                        print("No chrono patch needed:", file)
                '@ | python

      - name: Build wheel with cibuildwheel
        shell: pwsh
        run: |
          $sourceRoot = Get-Content SOURCE_ROOT.txt

          $env:CIBW_BUILD = "cp39-win_amd64"
          $env:CIBW_SKIP = "*musllinux* pp*"
          $env:CIBW_REPAIR_WHEEL_COMMAND = ""
          $env:CIBW_BUILD_VERBOSITY = "1"

          python -m cibuildwheel $sourceRoot --output-dir wheelhouse

      - name: Show wheels
        shell: pwsh
        run: |
          Get-ChildItem wheelhouse

      - name: Create release tag
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $suffix = "${{ github.event.inputs.release_suffix }}"
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
          "RELEASE_TAG=llama-cpp-python-$version-win-cp39-$suffix-$timestamp" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: |
            Custom Windows cp39 wheel for llama-cpp-python.

            Built from PyPI source tarball.

            Version:
            - llama-cpp-python: ${{ github.event.inputs.version }}
            - Python ABI: cp39-win_amd64
            - Runner: windows-2019
            - Builder: cibuildwheel 2.21.1

            Notes:
            - Source is downloaded at workflow runtime.
            - Adds missing `<chrono>` include only if needed.
          files: wheelhouse/*.whl
