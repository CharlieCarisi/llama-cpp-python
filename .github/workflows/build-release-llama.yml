name: Build and Release llama-cpp-python Wheel

on:
  workflow_dispatch:
    inputs:
      version:
        description: "llama-cpp-python version, e.g. 0.3.2, 0.3.3, 0.3.8"
        required: true
        default: "0.3.2"
      profile:
        description: "Build profile: official_like, no_openmp, safe"
        required: true
        default: "official_like"
      release_suffix:
        description: "Optional release suffix"
        required: true
        default: "test"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    runs-on: windows-2022

    steps:
      - name: Set up Python 3.9 x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          architecture: "x64"

      - name: Install host build tools
        shell: pwsh
        run: |
          python -m pip install --upgrade "pip<26" setuptools wheel
          python -m pip install uv cibuildwheel==2.21.1 build

      - name: Clone llama-cpp-python source
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $tag = "v$version"

          git clone --recursive https://github.com/abetlen/llama-cpp-python.git src
          cd src
          git fetch --tags
          git checkout $tag
          git submodule update --init --recursive

          Write-Host "Checked out:"
          git rev-parse HEAD

          Write-Host "Submodules:"
          git submodule status

      - name: Install project dependencies like official workflow
        shell: pwsh
        run: |
          cd src
          python -m uv pip install -e .[all] --verbose

      - name: Patch chrono includes robustly
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          root = Path("src") / "vendor" / "llama.cpp"

          if not root.exists():
              raise RuntimeError(f"Could not find llama.cpp source at {root}")

          patched = []

          for file in list(root.rglob("*.cpp")) + list(root.rglob("*.h")) + list(root.rglob("*.hpp")):
              text = file.read_text(encoding="utf-8", errors="ignore")

              if "std::chrono" not in text:
                  continue

              if "#include <chrono>" in text:
                  print("Already has <chrono>:", file)
                  continue

              file.write_text("#include <chrono>\n" + text, encoding="utf-8")
              patched.append(str(file))
              print("Patched <chrono>:", file)

          print("Total chrono patches:", len(patched))

          log_cpp = root / "common" / "log.cpp"
          common_cpp = root / "common" / "common.cpp"

          for file in [log_cpp, common_cpp]:
              print("=" * 80)
              print(file)
              if file.exists():
                  lines = file.read_text(encoding="utf-8", errors="ignore").splitlines()
                  for i, line in enumerate(lines[:25], 1):
                      print(f"{i:03d}: {line}")
              else:
                  print("MISSING")
          '@ | python

      - name: Set cibuildwheel environment
        shell: pwsh
        run: |
          $profile = "${{ github.event.inputs.profile }}"

          if ($profile -eq "official_like") {
            $cmakeArgs = ""
          }
          elseif ($profile -eq "no_openmp") {
            $cmakeArgs = "-DGGML_OPENMP=OFF -DGGML_BLAS=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_EXAMPLES=OFF"
          }
          elseif ($profile -eq "safe") {
            $cmakeArgs = "-DGGML_NATIVE=OFF -DGGML_CPU_ALL_VARIANTS=OFF -DGGML_BACKEND_DL=OFF -DGGML_BLAS=OFF -DGGML_OPENMP=OFF -DGGML_AVX=OFF -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_F16C=OFF -DGGML_AVX512=OFF -DGGML_CUDA=OFF -DGGML_VULKAN=OFF -DGGML_SYCL=OFF -DGGML_METAL=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_EXAMPLES=OFF"
          }
          else {
            throw "Unknown profile: $profile"
          }

          "BUILD_PROFILE=$profile" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CMAKE_ARGS_USED=$cmakeArgs" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Windows cp39 wheel with cibuildwheel
        shell: pwsh
        run: |
          $env:CIBW_BUILD = "cp39-win_amd64"
          $env:CIBW_SKIP = "*musllinux* pp*"
          $env:CIBW_REPAIR_WHEEL_COMMAND = ""
          $env:CIBW_BUILD_VERBOSITY = "2"

          $cmakeArgs = "${{ env.CMAKE_ARGS_USED }}"

          if ($cmakeArgs -ne "") {
            $env:CIBW_ENVIRONMENT_WINDOWS = "FORCE_CMAKE=1 CMAKE_ARGS='$cmakeArgs'"
          }
          else {
            $env:CIBW_ENVIRONMENT_WINDOWS = "FORCE_CMAKE=1"
          }

          Write-Host "Profile: ${{ env.BUILD_PROFILE }}"
          Write-Host "CIBW_ENVIRONMENT_WINDOWS: $env:CIBW_ENVIRONMENT_WINDOWS"

          python -m cibuildwheel src --output-dir wheelhouse

      - name: Show wheel and DLL hashes
        shell: pwsh
        run: |
          Get-ChildItem wheelhouse

          New-Item -ItemType Directory -Force -Path inspect | Out-Null
          $wheel = Get-ChildItem wheelhouse -Filter "*.whl" | Select-Object -First 1
          Copy-Item $wheel.FullName inspect\wheel.zip
          Expand-Archive inspect\wheel.zip -DestinationPath inspect\wheel -Force

          Get-ChildItem inspect\wheel -Recurse -Filter "*.dll" | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($_.Name) $($_.Length) $($hash.Hash.ToLower())"
          } | Tee-Object -FilePath inspect\dll_hashes.txt

          Get-Content inspect\dll_hashes.txt

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: dll-hashes-${{ github.event.inputs.version }}-${{ github.event.inputs.profile }}
          path: inspect/dll_hashes.txt

      - name: Create release tag
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $profile = "${{ github.event.inputs.profile }}"
          $suffix = "${{ github.event.inputs.release_suffix }}"
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
          "RELEASE_TAG=llama-cpp-python-$version-win-cp39-$profile-$suffix-$timestamp" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: |
            Custom Windows cp39 wheel for llama-cpp-python.

            Build method:
            - Empty repo workflow.
            - Clones official llama-cpp-python GitHub repository.
            - Checks out selected version tag.
            - Initializes submodules recursively.
            - Installs project extras with uv.
            - Builds with cibuildwheel.

            Version:
            - llama-cpp-python: ${{ github.event.inputs.version }}
            - Python ABI: cp39-win_amd64
            - Runner: windows-2022
            - Builder: cibuildwheel 2.21.1
            - Profile: ${{ env.BUILD_PROFILE }}

            CMake args:
            `${{ env.CMAKE_ARGS_USED }}`

            Notes:
            - `official_like` uses no explicit CMake args except FORCE_CMAKE=1.
            - `no_openmp` disables OpenMP and BLAS.
            - `safe` disables most CPU/backend variants.
            - Chrono patch is applied to any llama.cpp source file using `std::chrono` without `<chrono>`.
          files: wheelhouse/*.whl
