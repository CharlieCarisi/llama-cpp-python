name: Build and Release llama-cpp-python Wheel

on:
  workflow_dispatch:
    inputs:
      version:
        description: "llama-cpp-python version, e.g. 0.3.2, 0.3.3, 0.3.8"
        required: true
        default: "0.3.2"
      release_suffix:
        description: "Release suffix"
        required: true
        default: "force-chrono"
      runner:
        description: "Windows runner"
        required: true
        default: "windows-2022"
        type: choice
        options:
          - windows-2022
          - windows-2019

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    runs-on: ${{ github.event.inputs.runner }}

    steps:
      - name: Set up Python 3.9 x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          architecture: "x64"

      - name: Install build tools
        shell: pwsh
        run: |
          python -m pip install --upgrade "pip<26" setuptools wheel
          python -m pip install "cibuildwheel==2.21.1" build uv

      - name: Clone official llama-cpp-python source
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $tag = "v$version"

          Write-Host "Cloning llama-cpp-python tag $tag"

          git clone --recursive https://github.com/abetlen/llama-cpp-python.git src

          Set-Location src
          git fetch --tags
          git checkout $tag
          git submodule update --init --recursive

          Write-Host "Checked out commit:"
          git rev-parse HEAD

          Write-Host "Submodule status:"
          git submodule status

      - name: Install project build dependencies
        shell: pwsh
        run: |
          Set-Location src
          python -m uv pip install --system -e ".[all]" --verbose

      - name: Build Windows cp39 wheel with forced chrono include
        shell: pwsh
        run: |
          $env:CIBW_BUILD = "cp39-win_amd64"
          $env:CIBW_SKIP = "*musllinux* pp*"
          $env:CIBW_REPAIR_WHEEL_COMMAND = ""
          $env:CIBW_BUILD_VERBOSITY = "1"

          # This is the important fix:
          # MSVC reads the CL environment variable and applies it to all cl.exe compilations.
          # /FIchrono forces #include <chrono> into every compiled translation unit.
          $env:CIBW_ENVIRONMENT_WINDOWS = 'CL="/FIchrono"'

          # Stay close to the official build path. Do not set custom CMAKE_ARGS.
          Remove-Item Env:CMAKE_ARGS -ErrorAction SilentlyContinue
          Remove-Item Env:FORCE_CMAKE -ErrorAction SilentlyContinue

          python -m cibuildwheel src --output-dir wheelhouse

      - name: Generate wheel DLL hash report
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path reports | Out-Null

          @'
          import zipfile
          import hashlib
          from pathlib import Path

          wheels = list(Path("wheelhouse").glob("*.whl"))
          if not wheels:
              raise RuntimeError("No wheel found in wheelhouse")

          for wheel in wheels:
              print("Wheel:", wheel.name)
              print("Wheel size:", wheel.stat().st_size)
              print("Wheel sha256:", hashlib.sha256(wheel.read_bytes()).hexdigest())
              print()

              with zipfile.ZipFile(wheel, "r") as z:
                  dlls = sorted(
                      name for name in z.namelist()
                      if name.lower().endswith(".dll")
                  )

                  for name in dlls:
                      data = z.read(name)
                      print(
                          Path(name).name,
                          len(data),
                          hashlib.sha256(data).hexdigest(),
                          name,
                      )
          '@ | python | Tee-Object reports\wheel_dll_hashes.txt

      - name: Test wheel import and backend init on runner
        shell: pwsh
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force -Path reports | Out-Null

          $wheel = Get-ChildItem wheelhouse -Filter "*.whl" | Select-Object -First 1

          python -m venv testenv
          .\testenv\Scripts\python.exe -m pip install --upgrade "pip<26" setuptools wheel
          .\testenv\Scripts\python.exe -m pip install "numpy<2" diskcache jinja2 typing-extensions
          .\testenv\Scripts\python.exe -m pip install --force-reinstall --no-deps $wheel.FullName

          @'
          import os
          import sys
          import platform
          import traceback
          from pathlib import Path

          print("Python:", sys.version)
          print("Platform:", platform.platform())

          import llama_cpp
          print("llama_cpp version:", getattr(llama_cpp, "__version__", "unknown"))
          print("llama_cpp file:", llama_cpp.__file__)

          lib = Path(llama_cpp.__file__).resolve().parent / "lib"
          print("lib:", lib)

          for dll in sorted(lib.glob("*.dll")):
              print(dll.name, dll.stat().st_size)

          os.add_dll_directory(str(lib))

          from llama_cpp import llama_cpp as lc
          print("Native module:", lc)

          try:
              print("Calling llama_backend_init()")
              lc.llama_backend_init()
              print("llama_backend_init OK")
              lc.llama_backend_free()
              print("llama_backend_free OK")
          except Exception:
              print("llama_backend_init FAILED")
              traceback.print_exc()
          '@ | .\testenv\Scripts\python.exe | Tee-Object reports\runner_backend_test.txt

      - name: Show build outputs
        shell: pwsh
        run: |
          Write-Host "Wheelhouse:"
          Get-ChildItem wheelhouse | Format-Table Name, Length, LastWriteTime

          Write-Host "Reports:"
          Get-ChildItem reports | Format-Table Name, Length, LastWriteTime

      - name: Create release tag
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $suffix = "${{ github.event.inputs.release_suffix }}"
          $runner = "${{ github.event.inputs.runner }}"
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"

          "RELEASE_TAG=llama-cpp-python-$version-cp39-$runner-$suffix-$timestamp" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: |
            Custom Windows cp39 wheel for llama-cpp-python.

            Build method:
            - Empty repo workflow.
            - Clones official llama-cpp-python repository.
            - Checks out selected version tag.
            - Initializes submodules recursively.
            - Builds cp39-win_amd64 wheel using cibuildwheel.
            - Does not set custom CMAKE_ARGS.
            - Forces MSVC to include chrono using CL=/FIchrono.

            Inputs:
            - llama-cpp-python version: ${{ github.event.inputs.version }}
            - runner: ${{ github.event.inputs.runner }}
            - suffix: ${{ github.event.inputs.release_suffix }}

            Included reports:
            - wheel_dll_hashes.txt
            - runner_backend_test.txt
          files: |
            wheelhouse/*.whl
            reports/*.txt
