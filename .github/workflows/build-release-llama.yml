name: Build and Release llama-cpp-python Wheel

on:
  workflow_dispatch:
    inputs:
      version:
        description: "llama-cpp-python version, e.g. 0.3.2, 0.3.3, 0.3.8"
        required: true
        default: "0.3.2"
      release_suffix:
        description: "Optional release suffix"
        required: true
        default: "git-checkout-test"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    runs-on: windows-2022

    steps:
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          architecture: "x64"

      - name: Install tools
        shell: pwsh
        run: |
          python -m pip install --upgrade "pip<26" setuptools wheel
          python -m pip install cibuildwheel==2.21.1 build uv

      - name: Clone llama-cpp-python source at tag
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $tag = "v$version"

          git clone --recursive https://github.com/abetlen/llama-cpp-python.git src
          cd src
          git fetch --tags
          git checkout $tag
          git submodule update --init --recursive

          git rev-parse HEAD
          git submodule status

      - name: Patch source if needed
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          root = Path("src")

          files = [
              root / "vendor" / "llama.cpp" / "common" / "log.cpp",
              root / "vendor" / "llama.cpp" / "common" / "common.cpp",
          ]

          for file in files:
              if not file.exists():
                  print("Missing, skipped:", file)
                  continue

              text = file.read_text(encoding="utf-8", errors="ignore")

              if "std::chrono" in text and "#include <chrono>" not in text:
                  file.write_text("#include <chrono>\n" + text, encoding="utf-8")
                  print("Patched <chrono>:", file)
              else:
                  print("No chrono patch needed:", file)
          '@ | python

      - name: Build Windows cp39 wheel using cibuildwheel
        shell: pwsh
        run: |
          $env:CIBW_BUILD = "cp39-win_amd64"
          $env:CIBW_SKIP = "*musllinux* pp*"
          $env:CIBW_REPAIR_WHEEL_COMMAND = ""
          $env:CIBW_BUILD_VERBOSITY = "1"

          python -m cibuildwheel src --output-dir wheelhouse

      - name: Show wheels
        shell: pwsh
        run: |
          Get-ChildItem wheelhouse
          Get-ChildItem wheelhouse | Select-Object Name, Length, LastWriteTime

      - name: Create release tag
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $suffix = "${{ github.event.inputs.release_suffix }}"
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
          "RELEASE_TAG=llama-cpp-python-$version-win-cp39-$suffix-$timestamp" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: |
            Custom Windows cp39 wheel for llama-cpp-python.

            Build method:
            - Cloned official llama-cpp-python GitHub repository.
            - Checked out version tag.
            - Initialized submodules recursively.
            - Built with cibuildwheel.

            Version:
            - llama-cpp-python: ${{ github.event.inputs.version }}
            - Python ABI: cp39-win_amd64
            - Runner: windows-2019
            - Builder: cibuildwheel 2.21.1

            This should be closer to the official wheel build path than building from the PyPI source tarball.
          files: wheelhouse/*.whl
