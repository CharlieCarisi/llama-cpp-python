name: Build and Release llama-cpp-python Wheel

on:
  workflow_dispatch:
    inputs:
      version:
        description: "llama-cpp-python version"
        required: true
        default: "0.3.23"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    runs-on: windows-2022

    steps:
      - name: Set up Python 3.9 x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          architecture: "x64"

      - name: Install build tools
        run: |
          python -m pip install --upgrade "pip<26" setuptools wheel cmake ninja scikit-build-core

      - name: Build Intel Core Ultra optimized CPU wheel
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $env:CMAKE_ARGS = "-DGGML_NATIVE=ON -DGGML_CPU_ALL_VARIANTS=OFF -DGGML_BACKEND_DL=OFF -DGGML_BLAS=OFF -DGGML_OPENMP=ON -DGGML_AVX=ON -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON -DGGML_AVX512=OFF -DGGML_CUDA=OFF -DGGML_VULKAN=OFF -DGGML_SYCL=OFF -DGGML_METAL=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_SERVER=OFF -DCMAKE_BUILD_TYPE=Release"
          $env:FORCE_CMAKE = "1"
          python -m pip wheel "llama-cpp-python==$version" --no-cache-dir --no-deps -w wheelhouse -v

      - name: Create release tag
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
          "RELEASE_TAG=llama-cpp-python-safe-$version-win-py39-$timestamp" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: |
            Custom Windows CPU wheel for llama-cpp-python.

            Build settings:
            - Python 3.9 x64
            - GGML_NATIVE=OFF
            - GGML_BLAS=OFF
            - GGML_OPENMP=OFF
            - GGML_AVX512=OFF
            - Conservative CPU build for compatibility testing.
          files: wheelhouse/*.whl
