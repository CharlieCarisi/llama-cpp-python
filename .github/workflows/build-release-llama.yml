name: Build and Release llama-cpp-python Wheel

on:
  workflow_dispatch:
    inputs:
      version:
        description: "llama-cpp-python version"
        required: true
        default: "0.3.3"
      build_profile:
        description: "Build profile: safe or optimized"
        required: true
        default: "safe"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    runs-on: windows-2022

    steps:
      - name: Set up Python 3.9 x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          architecture: "x64"

      - name: Install build tools
        shell: pwsh
        run: |
          python -m pip install --upgrade "pip<26" setuptools wheel cmake ninja scikit-build-core

      - name: Download llama-cpp-python source
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          New-Item -ItemType Directory -Force -Path source | Out-Null
          python -m pip download "llama-cpp-python==$version" --no-binary=:all: --no-deps -d source

      - name: Extract and patch source
        shell: pwsh
        run: |
          @'
          import tarfile
          from pathlib import Path

          source_dir = Path("source")
          tgz = next(source_dir.glob("llama_cpp_python-*.tar.gz"))

          with tarfile.open(tgz, "r:gz") as t:
              t.extractall(source_dir)

          roots = [
              p for p in source_dir.iterdir()
              if p.is_dir() and p.name.startswith("llama_cpp_python")
          ]

          if not roots:
              raise RuntimeError("Could not find extracted llama_cpp_python source folder.")

          root = roots[0]
          print(f"Source root: {root}")

          patch_files = [
              root / "vendor" / "llama.cpp" / "common" / "log.cpp",
              root / "vendor" / "llama.cpp" / "common" / "common.cpp",
          ]

          for file in patch_files:
              if not file.exists():
                  print(f"Skipped missing file: {file}")
                  continue

              text = file.read_text(encoding="utf-8", errors="ignore")

              if "#include <chrono>" not in text:
                  text = "#include <chrono>\n" + text
                  file.write_text(text, encoding="utf-8")
                  print(f"Patched with <chrono>: {file}")
              else:
                  print(f"Already has <chrono>: {file}")

          Path("source_root.txt").write_text(str(root), encoding="utf-8")
          '@ | python

      - name: Build patched CPU wheel
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $profile = "${{ github.event.inputs.build_profile }}"
          $src = Get-Content source_root.txt

          if ($profile -eq "optimized") {
            $cmakeArgs = "-DGGML_NATIVE=OFF -DGGML_CPU_ALL_VARIANTS=OFF -DGGML_BACKEND_DL=OFF -DGGML_BLAS=OFF -DGGML_OPENMP=OFF -DGGML_AVX=ON -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON -DGGML_AVX512=OFF -DGGML_CUDA=OFF -DGGML_VULKAN=OFF -DGGML_SYCL=OFF -DGGML_METAL=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_SERVER=OFF -DCMAKE_BUILD_TYPE=Release"
          }
          elseif ($profile -eq "test") {
            $cmakeArgs = "-DGGML_NATIVE=OFF -DGGML_CPU_ALL_VARIANTS=ON -DGGML_BACKEND_DL=ON -DGGML_BLAS=OFF -DGGML_OPENMP=OFF -DGGML_AVX=ON -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON -DGGML_AVX512=OFF -DGGML_CUDA=OFF -DGGML_VULKAN=OFF -DGGML_SYCL=OFF -DGGML_METAL=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_EXAMPLES=OFF -DCMAKE_BUILD_TYPE=Release"
          }
          elseif ($profile -eq "empty") {
            Remove-Item Env:CMAKE_ARGS -ErrorAction SilentlyContinue
          }
          else {
            $cmakeArgs = "-DGGML_NATIVE=OFF -DGGML_CPU_ALL_VARIANTS=OFF -DGGML_BACKEND_DL=OFF -DGGML_BLAS=OFF -DGGML_OPENMP=OFF -DGGML_AVX=OFF -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_F16C=OFF -DGGML_AVX512=OFF -DGGML_CUDA=OFF -DGGML_VULKAN=OFF -DGGML_SYCL=OFF -DGGML_METAL=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_SERVER=OFF -DCMAKE_BUILD_TYPE=Release"
          }

          "BUILD_PROFILE=$profile" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LLAMA_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CMAKE_ARGS_USED=$cmakeArgs" | Out-File -FilePath $env:GITHUB_ENV -Append

          $env:CMAKE_ARGS = $cmakeArgs
          $env:FORCE_CMAKE = "1"

          python -m pip wheel $src --no-deps -w wheelhouse -v

      - name: Show built wheel
        shell: pwsh
        run: |
          Get-ChildItem wheelhouse
          Get-ChildItem wheelhouse | Select-Object Name, Length, LastWriteTime

      - name: Create release tag
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $profile = "${{ github.event.inputs.build_profile }}"
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
          "RELEASE_TAG=llama-cpp-python-$profile-$version-win-py39-$timestamp" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: |
            Custom Windows CPU wheel for llama-cpp-python.

            Version:
            - llama-cpp-python: ${{ env.LLAMA_VERSION }}
            - Python: 3.9 x64
            - Build profile: ${{ env.BUILD_PROFILE }}

            Source patches:
            - Adds `#include <chrono>` to llama.cpp `common/log.cpp` when missing.
            - Adds `#include <chrono>` to llama.cpp `common/common.cpp` when missing.

            CMake settings:
            `${{ env.CMAKE_ARGS_USED }}`

            Recommended test:
            ```powershell
            python check_llama_machine.py
            ```
          files: wheelhouse/*.whl
