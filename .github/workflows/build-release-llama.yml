name: Build and Release llama-cpp-python Wheel

on:
  workflow_dispatch:
    inputs:
      version:
        description: "llama-cpp-python version"
        required: true
        default: "0.3.3"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    runs-on: windows-2022

    steps:
      - name: Set up Python 3.9 x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          architecture: "x64"

      - name: Install build tools
        run: |
          python -m pip install --upgrade "pip<26" setuptools wheel cmake ninja scikit-build-core

      - name: Download llama-cpp-python source
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          New-Item -ItemType Directory -Force -Path source | Out-Null
          python -m pip download "llama-cpp-python==$version" --no-binary=:all: --no-deps -d source

      - name: Extract and patch source
        shell: pwsh
        run: |
          python - <<'PY'
          import tarfile
          from pathlib import Path

          source_dir = Path("source")
          tgz = next(source_dir.glob("llama_cpp_python-*.tar.gz"))

          with tarfile.open(tgz, "r:gz") as t:
              t.extractall(source_dir)

          root = next(
              p for p in source_dir.iterdir()
              if p.is_dir() and p.name.startswith("llama_cpp_python")
          )

          patch_files = [
              root / "vendor" / "llama.cpp" / "common" / "log.cpp",
              root / "vendor" / "llama.cpp" / "common" / "common.cpp",
          ]

          for file in patch_files:
              if not file.exists():
                  print("Not found, skipping:", file)
                  continue

              text = file.read_text(encoding="utf-8", errors="ignore")
              if "#include <chrono>" not in text:
                  file.write_text("#include <chrono>\n" + text, encoding="utf-8")
                  print("Patched:", file)
              else:
                  print("Already has chrono:", file)

          Path("source_root.txt").write_text(str(root), encoding="utf-8")
          print("Source root:", root)
          PY

      - name: Build Intel Core Ultra safe CPU wheel
        shell: pwsh
        run: |
          $src = Get-Content source_root.txt
          $version = "${{ github.event.inputs.version }}"
          $cmakeArgs = "-DGGML_NATIVE=OFF -DGGML_CPU_ALL_VARIANTS=OFF -DGGML_BACKEND_DL=OFF -DGGML_BLAS=OFF -DGGML_OPENMP=OFF -DGGML_AVX=OFF -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_F16C=OFF -DGGML_AVX512=OFF -DGGML_CUDA=OFF -DGGML_VULKAN=OFF -DGGML_SYCL=OFF -DGGML_METAL=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_EXAMPLES=OFF -DCMAKE_BUILD_TYPE=Release"
          $env:CMAKE_ARGS = $cmakeArgs
          $env:FORCE_CMAKE = "1"
          "BUILD_CMAKE_ARGS=$cmakeArgs" | Out-File -FilePath $env:GITHUB_ENV -Append
          python -m pip wheel $src --no-cache-dir --no-deps -w wheelhouse -v

      - name: Create release tag
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
          "RELEASE_TAG=llama-cpp-python-safe-$version-win-py39-$timestamp" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: |
            Custom Windows CPU wheel for llama-cpp-python.

            Version:
            ${{ github.event.inputs.version }}

            Build settings:
            ${{ env.BUILD_CMAKE_ARGS }}

            Notes:
            - Source build patched to add missing <chrono> include when needed.
            - Python 3.9 x64.
            - Conservative CPU-only build.
          files: wheelhouse/*.whl
