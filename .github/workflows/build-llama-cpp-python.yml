name: Build llama-cpp-python Windows Wheel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Set up Python 3.9 x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          architecture: "x64"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel cmake ninja

      - name: Build conservative CPU wheel
        shell: pwsh
        run: |
          $env:CMAKE_ARGS = "-DGGML_NATIVE=OFF -DGGML_BLAS=OFF -DGGML_AVX=ON -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON -DGGML_AVX512=OFF -DLLAMA_NATIVE=OFF -DLLAMA_BLAS=OFF -DLLAMA_AVX=ON -DLLAMA_AVX2=ON -DLLAMA_FMA=ON -DLLAMA_F16C=ON -DLLAMA_AVX512=OFF"
          $env:FORCE_CMAKE = "1"
          python -m pip wheel llama-cpp-python==0.3.2 --no-cache-dir --no-deps -w wheelhouse -v

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-python-0.3.2-windows-py39-cpu
          path: wheelhouse/*.whl
