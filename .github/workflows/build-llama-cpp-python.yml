name: Build llama-cpp-python 0.3.23 Windows Wheel

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Set up Python 3.9 x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          architecture: "x64"

      - name: Install build tools
        run: |
          python -m pip install --upgrade "pip<26" setuptools wheel cmake ninja scikit-build-core

      - name: Build conservative CPU wheel
        shell: pwsh
        run: |
          $env:CMAKE_ARGS = "-DGGML_NATIVE=OFF -DGGML_BLAS=OFF -DGGML_AVX=ON -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON -DGGML_AVX512=OFF -DGGML_OPENMP=OFF -DCMAKE_CXX_STANDARD=17"
          $env:FORCE_CMAKE = "1"
          python -m pip wheel llama-cpp-python==0.3.23 --no-cache-dir --no-deps -w wheelhouse -v

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-python-0.3.23-windows-py39-cpu-custom
          path: wheelhouse/*.whl
